<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 1000 480" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">The tool-call lifecycle: the model loops, calling tools until it is done</title>
  <desc id="d">The user sends a message to the model. Then a loop runs while the model keeps calling tools: the model emits a tool call (name and arguments), the SDK validates the arguments and runs your execute() function, the tool returns output, and the SDK appends that result to the conversation. The model reads the result and decides - call another tool (loop again) or finish. Only when no tool calls remain (or a max-turns guard trips) does the model return the final answer to the user.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0b5"/>
    </marker>
    <marker id="arrowMauve" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c6a0f6"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e2030" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ===================== lifelines ===================== -->
  <g stroke="#6e738d" stroke-width="1.5" stroke-dasharray="3 5">
    <line x1="120" y1="100" x2="120" y2="502"/>
    <line x1="370" y1="100" x2="370" y2="502"/>
    <line x1="620" y1="100" x2="620" y2="502"/>
    <line x1="860" y1="100" x2="860" y2="502"/>
  </g>

  <!-- activation bars (who is busy when) -->
  <rect x="365" y="150" width="10" height="320" fill="#c6a0f6" fill-opacity="0.5" stroke="#9a6ee0" stroke-width="1"/>
  <rect x="615" y="230" width="10" height="114" fill="#8bd5ca" fill-opacity="0.5" stroke="#5cb3a6" stroke-width="1"/>
  <rect x="855" y="266" width="10" height="40"  fill="#a6da95" fill-opacity="0.5" stroke="#74b663" stroke-width="1"/>

  <!-- ===================== participant headers ===================== -->
  <g filter="url(#soft)">
    <rect x="70"  y="56" width="100" height="44" rx="12" fill="#8aadf4" stroke="#5b7fd6" stroke-width="1.5"/>
    <rect x="298" y="56" width="144" height="44" rx="12" fill="#c6a0f6" stroke="#9a6ee0" stroke-width="1.5"/>
    <rect x="534" y="56" width="172" height="44" rx="12" fill="#8bd5ca" stroke="#5cb3a6" stroke-width="1.5"/>
    <rect x="768" y="56" width="184" height="44" rx="12" fill="#a6da95" stroke="#74b663" stroke-width="1.5"/>
  </g>
  <text x="120" y="84" text-anchor="middle" font-size="17" font-weight="700" fill="#16223a">User</text>
  <text x="370" y="84" text-anchor="middle" font-size="17" font-weight="700" fill="#241634">Model</text>
  <text x="620" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#10302b">SDK</text>
  <text x="620" y="95" text-anchor="middle" font-size="10.5" fill="#10302b">runtime</text>
  <text x="860" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#16280f">Tool</text>
  <text x="860" y="95" text-anchor="middle" font-size="10.5" fill="#16280f">your execute()</text>

  <!-- ===================== 0. user message (once, before the loop) ===================== -->
  <path d="M120,150 L363,150" fill="none" stroke="#9aa0b5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="242" y="142" text-anchor="middle" font-size="13" fill="#cad3f5">message (the goal)</text>

  <!-- ===================== loop frame ===================== -->
  <rect x="300" y="190" width="658" height="250" rx="8" fill="none" stroke="#9aa0b5" stroke-width="1.5"/>
  <path d="M300,190 H360 V204 L350,212 H300 Z" fill="#45475a" stroke="#9aa0b5" stroke-width="1.5"/>
  <text x="326" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#cad3f5">loop</text>
  <text x="370" y="206" font-size="11.5" fill="#a5adcb">[ while the model keeps calling tools ]</text>

  <!-- back-edge: model decides to call another tool -->
  <path d="M365,372 H332 Q320,372 320,362 V248 Q320,236 332,236 H363"
        fill="none" stroke="#c6a0f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowMauve)"/>
  <text transform="translate(311,308) rotate(-90)" text-anchor="middle" font-size="11.5" font-weight="600" fill="#c6a0f6">calls another tool &#183; repeat</text>

  <!-- 1. model -> SDK : tool call -->
  <path d="M375,236 L613,236" fill="none" stroke="#9aa0b5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="497" y="228" text-anchor="middle" font-size="13" fill="#cad3f5">1 &#183; tool call (name + args)</text>

  <!-- 2. SDK -> Tool : validate + run execute -->
  <path d="M625,270 L853,270" fill="none" stroke="#9aa0b5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="739" y="262" text-anchor="middle" font-size="13" fill="#cad3f5">2 &#183; validate args, run execute()</text>

  <!-- 3. Tool -> SDK : return output (dashed return) -->
  <path d="M855,304 L627,304" fill="none" stroke="#9aa0b5" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="739" y="296" text-anchor="middle" font-size="13" fill="#cad3f5">3 &#183; return output (string)</text>

  <!-- 4. SDK -> Model : append result -->
  <path d="M613,340 L375,340" fill="none" stroke="#9aa0b5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="497" y="332" text-anchor="middle" font-size="13" fill="#cad3f5">4 &#183; append result to the context</text>

  <!-- decision the model makes after each result -->
  <rect x="404" y="362" width="246" height="30" rx="8" fill="#363a4f" stroke="#eed49f" stroke-width="1.5"/>
  <text x="527" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#cad3f5">another tool? &#8594; <tspan fill="#c6a0f6">loop</tspan> &#160;&#183;&#160; done? &#8594; <tspan fill="#a6da95">finish</tspan></text>

  <!-- ===================== final answer (outside the loop) ===================== -->
  <path d="M365,470 L122,470" fill="none" stroke="#9aa0b5" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="244" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#cad3f5">final answer</text>
  <text x="244" y="486" text-anchor="middle" font-size="11" fill="#a5adcb">only when no tool calls remain (or max turns)</text>
</svg>
