<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 1000 545" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">An AI agent: an LLM controller drives a runtime loop within developer-set bounds</title>
  <desc id="d">Given a goal, the LLM controller repeatedly decides the next action - call a tool, ask the user, or finish. A runtime loop executes the chosen action and feeds the result back into the controller's context, continuing until the model judges the goal met or a stop condition trips. The model operates within developer-set tools, guardrails, and stop conditions. The model's output determines the control flow, rather than a predetermined code path.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0b5"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8bd5ca"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e2030" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ===================== developer-set sandbox ===================== -->
  <text x="500" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#9aa0b5">developer-set sandbox &#160;&#183;&#160; tools &#183; guardrails &#183; stop conditions</text>
  <rect x="150" y="70" width="700" height="420" rx="24" fill="none" stroke="#6e738d" stroke-width="2" stroke-dasharray="5 7"/>

  <!-- ===================== arrows (under the nodes) ===================== -->
  <g fill="none" stroke="#9aa0b5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M134,135 L378,135" marker-end="url(#arrow)"/>            <!-- goal -> controller -->
    <path d="M430,202 L290,251" marker-end="url(#arrow)"/>            <!-- controller -> call a tool -->
    <path d="M500,202 L500,251" marker-end="url(#arrow)"/>            <!-- controller -> ask the user -->
    <path d="M570,202 L710,251" marker-end="url(#arrow)"/>            <!-- controller -> finish -->
    <path d="M275,325 L275,376" marker-end="url(#arrow)"/>            <!-- tool -> runtime -->
    <path d="M500,325 L500,376" marker-end="url(#arrow)"/>            <!-- ask -> runtime -->
    <path d="M805,289 L866,289" marker-end="url(#arrow)"/>            <!-- finish -> final answer -->
  </g>
  <!-- feedback loop: runtime -> controller -->
  <path d="M185,413 H180 Q172,413 172,405 V190 Q172,182 180,182 H378"
        fill="none" stroke="#8bd5ca" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  <text transform="translate(162,300) rotate(-90)" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8bd5ca">result fed back &#183; loop again</text>

  <!-- ===================== nodes ===================== -->
  <!-- Goal (outside the sandbox: user input) -->
  <g filter="url(#soft)">
    <rect x="14" y="105" width="120" height="60" rx="14" fill="#cad3f5" stroke="#9aa3c2" stroke-width="1.5"/>
  </g>
  <text x="74" y="131" text-anchor="middle" font-size="18" font-weight="700" fill="#1b2335">Goal</text>
  <text x="74" y="151" text-anchor="middle" font-size="11" fill="#5b6078">from the user</text>

  <!-- LLM controller (the brain) -->
  <g filter="url(#soft)">
    <rect x="380" y="110" width="240" height="92" rx="18" fill="#c6a0f6" stroke="#9a6ee0" stroke-width="2.5"/>
  </g>
  <text x="500" y="150" text-anchor="middle" font-size="23" font-weight="700" fill="#241634">LLM controller</text>
  <text x="500" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#3a2459">decides the next action</text>

  <!-- Three next actions the model chooses among -->
  <!-- Call a tool (green) -->
  <g filter="url(#soft)">
    <rect x="185" y="253" width="180" height="72" rx="14" fill="#a6da95" stroke="#74b663" stroke-width="1.5"/>
  </g>
  <text x="275" y="287" text-anchor="middle" font-size="18" font-weight="700" fill="#16280f">Call a tool</text>
  <text x="275" y="308" text-anchor="middle" font-size="11" fill="#1c3312">act on the world</text>

  <!-- Ask the user (blue) -->
  <g filter="url(#soft)">
    <rect x="410" y="253" width="180" height="72" rx="14" fill="#8aadf4" stroke="#5b7fd6" stroke-width="1.5"/>
  </g>
  <text x="500" y="287" text-anchor="middle" font-size="18" font-weight="700" fill="#16223a">Ask the user</text>
  <text x="500" y="308" text-anchor="middle" font-size="11" fill="#1e2c45">get more input</text>

  <!-- Finish (lavender) -->
  <g filter="url(#soft)">
    <rect x="635" y="253" width="170" height="72" rx="14" fill="#b8c0e0" stroke="#8891b5" stroke-width="1.5"/>
  </g>
  <text x="720" y="285" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2433">Finish</text>
  <text x="720" y="306" text-anchor="middle" font-size="11" fill="#2a3045">the goal is met</text>

  <!-- Runtime loop (infrastructure panel, not the model) -->
  <rect x="185" y="378" width="405" height="70" rx="14" fill="#45475a" stroke="#8bd5ca" stroke-width="1.5"/>
  <text x="387" y="405" text-anchor="middle" font-size="16" font-weight="700" fill="#8bd5ca">The runtime loop</text>
  <text x="387" y="427" text-anchor="middle" font-size="12" fill="#cdd6f4">executes the action &#183; appends the result to the context</text>

  <!-- Final answer (outside the sandbox: output) -->
  <g filter="url(#soft)">
    <rect x="868" y="257" width="124" height="64" rx="16" fill="#b8c0e0" stroke="#8891b5" stroke-width="1.5"/>
  </g>
  <text x="930" y="285" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2433">Final answer</text>
  <text x="930" y="304" text-anchor="middle" font-size="11" fill="#2a3045">returned to you</text>

  <!-- ===================== caption + punchline ===================== -->
  <text x="500" y="520" text-anchor="middle" font-size="14" fill="#9aa0b5">Loops until the model judges the goal met &#8212; or a stop condition trips.</text>

  <rect x="150" y="535" width="700" height="40" rx="12" fill="#363a4f" stroke="#9a6ee0" stroke-width="1.5"/>
  <text x="500" y="560" text-anchor="middle" font-size="15" font-weight="700" fill="#cad3f5">The model&#8217;s <tspan fill="#c6a0f6">output determines the control flow</tspan> &#8212; <tspan fill="#f5a97f">not a predetermined code path</tspan></text>
</svg>
